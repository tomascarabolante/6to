<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de presentación</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-background">
    <main class="card-wrapper">
      <article class="profile-card">
        <div class="card-cover"></div>
        <div class="avatar-frame">
          <img src="https://via.placeholder.com/120" alt="Avatar" class="avatar">
        </div>
        <section class="card-body">
          <h1>Tomás Carabolante</h1>
          <p class="location">San Francisco, Córdoba, Argentina</p>
          <p class="bio">Estudiante de PRoA, me gusta programar y tocar el piano.</p>
          <a class="cta-button" href="#">Seguir en GitHub</a>
          <div class="social-links">
            <a href="#" aria-label="Twitter">&#x1F426;</a>
            <a href="#" aria-label="LinkedIn">in</a>
            <a href="#" aria-label="Instagram">&#x1F4F7;</a>
          </div>
        </section>
      </article>
    </main>
  </div>
</body>
</html>
